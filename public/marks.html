<div class="container">

<thead>

<table border="1" width="100%" cellpadding="10">

<tr>

    <td>B.Sc Horticulture</td>
</tr>

<tr>
    <td><b>Semester</b></td>
    <td>V Semester</td>
</tr>

<tr>
    <th>Subject</th>
    <th>Marks</th>
</tr>

<tbody id="marksTable"></tbody>

<tr>
    <th>Total</th>
    <th id="totalMarks"></th>
</tr>

<tr>
    <th>Percentage</th>
    <th id="percentage"></th>
</tr>

<tr>
    <th>GPA</th>
    <th id="gpa"></th>
</tr>

<tr>
    <th>Result</th>
    <th id="result"></th>
</tr>

</table>

<br>

<tbody id="marksTable">
</tbody>

<tr>
    <th>Total</th>
    <th id="totalMarks"></th>
</tr>

<tr>
    <th>Percentage</th>
    <th id="percentage"></th>
</tr>

<tr>
    <th>GPA</th>
    <th id="gpa"></th>
</tr>

<tr>
    <th>Result</th>
    <th id="result"></th>
</tr>

</table>

<br>

<a href="dashboard.html">
    <button>Back</button>
</a>

</div>

<script src="script.js"></script>

<script>

const pin = localStorage.getItem("studentPin");

const student = students[pin];

const marksTable = document.getElementById("marksTable");

let total = 0;
let count = 0;

for(let subject in student.marks){

    let marks = student.marks[subject];

    total += marks;
    count++;

    marksTable.innerHTML += `
        <tr>
            <td>${subject}</td>
            <td>${marks}</td>
        </tr>
    `;
}

document.getElementById("totalMarks").innerHTML = total;

document.getElementById("percentage").innerHTML =
(total / count).toFixed(2) + "%";

document.getElementById("studentName").innerHTML =
student.name;
is there any issue
document.getElementById("studentPin").innerHTML =
pin;

document.getElementById("gpa").innerHTML =
student.gpa;

document.getElementById("result").innerHTML =
student.result;

</script>

</body>
</html>
